<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/satoshi-400.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<!-- Self-hosted (see static/katex/), not loaded from a CDN, matching the
		     Satoshi font. Small enough (~7KB gzipped) to load globally rather
		     than conditionally per-page. -->
		<link rel="stylesheet" href="%sveltekit.assets%/katex/katex.min.css" />
		<style>
			@font-face {
				font-family: 'Satoshi';
				src: url('%sveltekit.assets%/fonts/satoshi-400.woff2') format('woff2');
				font-weight: 400;
				font-style: normal;
				font-display: swap;
			}
			@font-face {
				font-family: 'Satoshi';
				src: url('%sveltekit.assets%/fonts/satoshi-500.woff2') format('woff2');
				font-weight: 500;
				font-style: normal;
				font-display: swap;
			}
			@font-face {
				font-family: 'Satoshi';
				src: url('%sveltekit.assets%/fonts/satoshi-700.woff2') format('woff2');
				font-weight: 700;
				font-style: normal;
				font-display: swap;
			}
			@font-face {
				font-family: 'Satoshi';
				src: url('%sveltekit.assets%/fonts/satoshi-900.woff2') format('woff2');
				font-weight: 900;
				font-style: normal;
				font-display: swap;
			}
		</style>
		<script>
			(function () {
				var theme = 'dark';
				try {
					var stored = localStorage.getItem('svocs-theme');
					if (stored === 'light' || stored === 'dark') {
						theme = stored;
					} else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
						theme = 'light';
					}
				} catch (e) {
					/* fall back to dark */
				}
				document.documentElement.dataset.theme = theme;
			})();
		</script>
		<script
			defer
			src="https://umami.bawkbawk.net/script.js"
			data-website-id="5efe614b-d09f-4963-84e3-51ba275ad1da"
		></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
