server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;

	# The direct peer is always Coolify's proxy on the internal docker network,
	# never Cloudflare itself, so trust the private ranges and take the visitor
	# IP from the CF-Connecting-IP header Cloudflare sets. Requests that bypass
	# Cloudflare could spoof this header — the origin firewall is what prevents
	# that, not nginx.
	set_real_ip_from 10.0.0.0/8;
	set_real_ip_from 172.16.0.0/12;
	set_real_ip_from 192.168.0.0/16;
	real_ip_header CF-Connecting-IP;

	# SvelteKit's static adapter writes clean-URL files (e.g. docs/getting-started.html
	# for /docs/getting-started), so an exact-path request never matches a real file —
	# always fall back to trying "<path>.html" before giving up.
	location / {
		try_files $uri $uri.html $uri/ =404;
	}

	# fallback: '404.html' in vite.config.ts renders the app shell + our own
	# +error.svelte for any unmatched path, instead of a bare nginx 404.
	error_page 404 /404.html;
	location = /404.html {
		internal;
	}

	# Content-hashed build assets are safe to cache forever.
	location /_app/immutable/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
		try_files $uri =404;
	}

	# Fonts and the search index rarely change but aren't content-hashed —
	# cache for a day rather than forever.
	location ~* \.(woff2?|pf_fragment|pf_index)$ {
		add_header Cache-Control "public, max-age=86400";
		try_files $uri =404;
	}

	# HTML responses can change on every deploy without their URL changing,
	# so they must always be revalidated.
	location ~* \.html$ {
		add_header Cache-Control "public, max-age=0, must-revalidate";
		try_files $uri =404;
	}

	gzip on;
	gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
